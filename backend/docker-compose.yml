services:
  postgres:
    image: postgres:16-alpine
    container_name: activebuddies_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: activebuddies
      POSTGRES_PASSWORD: activebuddies
      POSTGRES_DB: activebuddies
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U activebuddies -d activebuddies"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: activebuddies_redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
